services:
  pg-logicore:
    image: postgres:16.0
    container_name: pg-logicore
    volumes:
      - pg-logicore_data:/var/lib/postgresql/data
    env_file:
      - ./.env.pg-secrets
    logging:
      options:
        max-size: 10m
        max-file: "3"
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "logi-core_user"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - logi-core-net
    restart: always

  pg-logicore-init:
    image: postgres:16 # Используем тот же образ, там есть psql
    container_name: pg-logicore-init
    volumes:
      - ../pg-logicore/init-db.sh:/init-db.sh
    entrypoint: [ "/bin/bash", "/init-db.sh" ]
    env_file: ./.env.pg-secrets
    networks:
      - logi-core-net
    depends_on:
      pg-logicore:
        condition: service_healthy # Ждем, пока основная база поднимется

  core-logistics:
    build:
      context: ../           # Контекст — корень LogiCore
      dockerfile: ./core-logistics/Dockerfile # Относительно корня
    container_name: core-logistics
    env_file:
      - ../core-logistics/.env.pg-secrets
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - LOG_DIR=/app/logs
    ports:
      - "8001:8080"
    depends_on:
      pg-logicore-init:
        condition: service_completed_successfully # Ждем, пока создадутся схемы/юзеры
    restart: unless-stopped
    networks:
      - logi-core-net

  routing-engine:
    build:
      context: ../           # корень (LogiCore)
      dockerfile: ./routing-engine/Dockerfile # Относительно корня
    container_name: routing-engine
    env_file:
      - ../routing-engine/.env.pg-secrets
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - LOG_DIR=/app/logs
    ports:
      - "8002:8080"
    depends_on:
      pg-logicore-init:
        condition: service_completed_successfully # Ждем, пока создадутся схемы/юзеры
    restart: unless-stopped
    networks:
      - logi-core-net

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      # Настройки для работы в один узел (без репликации):
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - logi-core-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8180:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - logi-core-net

networks:
  logi-core-net:
    driver: bridge

volumes:
  pg-logicore_data:
  kafka_data:

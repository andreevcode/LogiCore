services:
  pg-logistics:
    image: postgres:16.0
    container_name: pg-logistics
    volumes:
      - pg-logistics_data:/var/lib/postgresql/data
    env_file:
      - ./.env.pg-secrets
    logging:
      options:
        max-size: 10m
        max-file: "3"
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "logistics"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - core-logistics-net
    restart: always


  core-logistics:
    build: ../core-logistics
    container_name: core-logistics
    env_file:
      - ./.env.pg-secrets
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - LOG_DIR=/app/logs
    ports:
      - "8001:8001"
    depends_on:
      - pg-logistics
    restart: unless-stopped
    networks:
      - core-logistics-net

networks:
  core-logistics-net:
    driver: bridge

volumes:
  pg-logistics_data:

services:
  pg-logistics:
    image: postgres:16.0
    container_name: pg-logistics
    volumes:
      - pg-logistics_data:/var/lib/postgresql/data
    env_file:
      - ./.env.pg-secrets
    logging:
      options:
        max-size: 10m
        max-file: "3"
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "logistics"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - core-logistics-net
    restart: always


  core-logistics:
    build:
      context: ../           # Контекст — корень LogiCore
      dockerfile: ./core-logistics/Dockerfile # Относительно корня
    container_name: core-logistics
    env_file:
      - ../core-logistics/.env.pg-secrets
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - LOG_DIR=/app/logs
    ports:
      - "8001:8080"
    depends_on:
      - pg-logistics
    restart: unless-stopped
    networks:
      - core-logistics-net

  kafka:
    image: apache/kafka:3.7.0
#    image: apache/kafka:4.2.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      # Настройки для работы в один узел (без репликации):
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - core-logistics-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8180:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - core-logistics-net

networks:
  core-logistics-net:
    driver: bridge

volumes:
  pg-logistics_data:
  kafka_data:
